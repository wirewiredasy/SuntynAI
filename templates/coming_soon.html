{% extends "base.html" %}

{% block title %}{{ tool_name }} - PDF Toolkit{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card">
                <div class="card-body py-5">
                    <i class="ti ti-tools text-primary" style="font-size: 4rem;"></i>
                    <h2 class="mt-4">{{ tool_name }}</h2>
                    <p class="lead text-muted">This tool is being prepared and will be available soon!</p>
                    <p class="mb-4">We're working hard to bring you the most advanced PDF and image processing tools.</p>
                    <a href="/" class="btn btn-primary">Back to Tools</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
