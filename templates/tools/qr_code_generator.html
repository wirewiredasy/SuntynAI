{% extends "base.html" %}

{% block title %}QR Code Generator - Suntyn AI{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">
                        <i class="ti ti-qrcode me-2"></i>
                        QR Code Generator
                    </h3>
                </div>
                <div class="card-body">
                    <form id="qr-form" class="mb-4">
                        <div class="mb-3">
                            <label for="text" class="form-label">Enter text or URL</label>
                            <textarea class="form-control" id="text" name="text" rows="3" placeholder="Enter text, URL, or any content you want to encode"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="size" class="form-label">Size</label>
                                <select class="form-select" id="size" name="size">
                                    <option value="small">Small (200x200)</option>
                                    <option value="medium" selected>Medium (400x400)</option>
                                    <option value="large">Large (600x600)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="format" class="form-label">Format</label>
                                <select class="form-select" id="format" name="format">
                                    <option value="PNG" selected>PNG</option>
                                    <option value="SVG">SVG</option>
                                </select>
                            </div>
                        </div>
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="ti ti-download me-2"></i>
                                Generate QR Code
                            </button>
                        </div>
                    </form>
                    
                    <div id="result" class="text-center" style="display: none;">
                        <div class="alert alert-success">
                            <h5>QR Code Generated Successfully!</h5>
                            <div id="qr-preview" class="my-3"></div>
                            <a href="#" id="download-link" class="btn btn-success" download>
                                <i class="ti ti-download me-2"></i>Download QR Code
                            </a>
                        </div>
                    </div>
                    
                    <div id="error" class="alert alert-danger" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('qr-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const text = formData.get('text');
    
    if (!text.trim()) {
        showError('Please enter some text or URL');
        return;
    }
    
    // Show loading
    const submitBtn = this.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Generating...';
    submitBtn.disabled = true;
    
    fetch('/api/process-tool/qr-code-generator', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showResult(data.download_url);
        } else {
            showError(data.error || 'Failed to generate QR code');
        }
    })
    .catch(error => {
        showError('Network error: ' + error.message);
    })
    .finally(() => {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
    });
});

function showResult(downloadUrl) {
    document.getElementById('result').style.display = 'block';
    document.getElementById('error').style.display = 'none';
    document.getElementById('qr-preview').innerHTML = `<img src="${downloadUrl}" alt="QR Code" class="img-fluid" style="max-width: 300px;">`;
    document.getElementById('download-link').href = downloadUrl;
}

function showError(message) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = message;
    document.getElementById('result').style.display = 'none';
}
</script>
{% endblock %}
