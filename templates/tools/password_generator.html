{% extends "base.html" %}

{% block title %}Password Generator - Suntyn AI{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">
                        <i class="ti ti-shield-lock me-2"></i>
                        Password Generator
                    </h3>
                </div>
                <div class="card-body">
                    <form id="password-form" class="mb-4">
                        <div class="mb-3">
                            <label for="length" class="form-label">Password Length: <span id="length-value">12</span></label>
                            <input type="range" class="form-range" id="length" name="length" min="4" max="50" value="12">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Include Characters:</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="uppercase" name="uppercase" checked>
                                <label class="form-check-label" for="uppercase">Uppercase Letters (A-Z)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="lowercase" name="lowercase" checked>
                                <label class="form-check-label" for="lowercase">Lowercase Letters (a-z)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="numbers" name="numbers" checked>
                                <label class="form-check-label" for="numbers">Numbers (0-9)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="symbols" name="symbols" checked>
                                <label class="form-check-label" for="symbols">Symbols (!@#$%^&*)</label>
                            </div>
                        </div>
                        
                        <div class="text-center">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="ti ti-refresh me-2"></i>
                                Generate Password
                            </button>
                        </div>
                    </form>
                    
                    <div id="result" class="text-center" style="display: none;">
                        <div class="alert alert-success">
                            <h5>Password Generated Successfully!</h5>
                            <div class="mb-3">
                                <div class="input-group">
                                    <input type="text" class="form-control text-center" id="generated-password" readonly>
                                    <button class="btn btn-outline-primary" type="button" onclick="copyPassword()">
                                        <i class="ti ti-copy"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-2">
                                <span class="badge bg-info">Strength: <span id="password-strength"></span></span>
                            </div>
                        </div>
                    </div>
                    
                    <div id="error" class="alert alert-danger" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Update length display
document.getElementById('length').addEventListener('input', function() {
    document.getElementById('length-value').textContent = this.value;
});

document.getElementById('password-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    
    // Check at least one character type is selected
    if (!formData.get('uppercase') && !formData.get('lowercase') && 
        !formData.get('numbers') && !formData.get('symbols')) {
        showError('Please select at least one character type');
        return;
    }
    
    // Show loading
    const submitBtn = this.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Generating...';
    submitBtn.disabled = true;
    
    fetch('/api/process-tool/password-generator', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showResult(data.password, data.strength);
        } else {
            showError(data.error || 'Failed to generate password');
        }
    })
    .catch(error => {
        showError('Network error: ' + error.message);
    })
    .finally(() => {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
    });
});

function showResult(password, strength) {
    document.getElementById('result').style.display = 'block';
    document.getElementById('error').style.display = 'none';
    document.getElementById('generated-password').value = password;
    document.getElementById('password-strength').textContent = strength;
}

function showError(message) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = message;
    document.getElementById('result').style.display = 'none';
}

function copyPassword() {
    const passwordField = document.getElementById('generated-password');
    passwordField.select();
    document.execCommand('copy');
    
    // Show feedback
    const copyBtn = event.target.closest('button');
    const originalHTML = copyBtn.innerHTML;
    copyBtn.innerHTML = '<i class="ti ti-check"></i>';
    setTimeout(() => {
        copyBtn.innerHTML = originalHTML;
    }, 2000);
}
</script>
{% endblock %}
