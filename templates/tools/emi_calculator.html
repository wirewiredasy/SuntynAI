{% extends "base.html" %}

{% block title %}EMI Calculator - Suntyn AI{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-lg">
                <div class="card-header bg-info text-white">
                    <h3 class="mb-0">
                        <i class="ti ti-calculator me-2"></i>
                        EMI Calculator
                    </h3>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <form id="emi-form">
                                <div class="mb-3">
                                    <label for="principal" class="form-label">Loan Amount (₹)</label>
                                    <input type="number" class="form-control" id="principal" name="principal" value="500000" min="1000" step="1000">
                                </div>
                                <div class="mb-3">
                                    <label for="rate" class="form-label">Interest Rate (% per annum)</label>
                                    <input type="number" class="form-control" id="rate" name="rate" value="9.5" min="0.1" max="50" step="0.1">
                                </div>
                                <div class="mb-3">
                                    <label for="tenure" class="form-label">Loan Tenure (Years)</label>
                                    <input type="number" class="form-control" id="tenure" name="tenure" value="20" min="1" max="30" step="1">
                                </div>
                                <button type="submit" class="btn btn-info btn-lg w-100">
                                    <i class="ti ti-calculator me-2"></i>
                                    Calculate EMI
                                </button>
                            </form>
                        </div>
                        <div class="col-md-6">
                            <div id="result" style="display: none;">
                                <div class="alert alert-success">
                                    <h5>EMI Calculation Result</h5>
                                    <div class="row">
                                        <div class="col-6">
                                            <div class="card bg-light">
                                                <div class="card-body text-center">
                                                    <h6 class="card-title">Monthly EMI</h6>
                                                    <h4 class="text-success">₹<span id="emi-amount">0</span></h4>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="card bg-light">
                                                <div class="card-body text-center">
                                                    <h6 class="card-title">Total Payment</h6>
                                                    <h4 class="text-primary">₹<span id="total-payment">0</span></h4>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row mt-3">
                                        <div class="col-6">
                                            <div class="card bg-light">
                                                <div class="card-body text-center">
                                                    <h6 class="card-title">Principal Amount</h6>
                                                    <h4 class="text-info">₹<span id="principal-amount">0</span></h4>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="card bg-light">
                                                <div class="card-body text-center">
                                                    <h6 class="card-title">Total Interest</h6>
                                                    <h4 class="text-warning">₹<span id="total-interest">0</span></h4>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div id="error" class="alert alert-danger" style="display: none;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('emi-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    
    // Show loading
    const submitBtn = this.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Calculating...';
    submitBtn.disabled = true;
    
    fetch('/api/process-tool/emi-calculator', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showResult(data);
        } else {
            showError(data.error || 'Failed to calculate EMI');
        }
    })
    .catch(error => {
        showError('Network error: ' + error.message);
    })
    .finally(() => {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
    });
});

function showResult(data) {
    document.getElementById('result').style.display = 'block';
    document.getElementById('error').style.display = 'none';
    
    document.getElementById('emi-amount').textContent = data.emi.toLocaleString();
    document.getElementById('total-payment').textContent = data.total_payment.toLocaleString();
    document.getElementById('principal-amount').textContent = data.principal.toLocaleString();
    document.getElementById('total-interest').textContent = data.total_interest.toLocaleString();
}

function showError(message) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = message;
    document.getElementById('result').style.display = 'none';
}

// Auto-calculate on input change
document.querySelectorAll('#principal, #rate, #tenure').forEach(input => {
    input.addEventListener('input', function() {
        // Auto-submit after 500ms delay
        clearTimeout(window.autoCalcTimeout);
        window.autoCalcTimeout = setTimeout(() => {
            document.getElementById('emi-form').dispatchEvent(new Event('submit'));
        }, 500);
    });
});
</script>
{% endblock %}
