{% extends "base.html" %}

{% block title %}PDF Merger - Suntyn AI{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-lg">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0">
                        <i class="ti ti-file-plus me-2"></i>
                        PDF Merger
                    </h3>
                </div>
                <div class="card-body">
                    <form id="pdf-form" enctype="multipart/form-data">
                        <div class="upload-area mb-4">
                            <div class="border border-dashed border-primary rounded p-5 text-center">
                                <i class="ti ti-cloud-upload display-4 text-primary mb-3"></i>
                                <h5>Drop PDF files here or click to select</h5>
                                <p class="text-muted">Select multiple PDF files to merge them into one document</p>
                                <input type="file" id="pdf-files" name="files" multiple accept=".pdf" class="d-none">
                                <button type="button" class="btn btn-primary" onclick="document.getElementById('pdf-files').click()">
                                    <i class="ti ti-file-plus me-2"></i>Select PDF Files
                                </button>
                            </div>
                        </div>
                        
                        <div id="file-list" class="mb-4" style="display: none;">
                            <h6>Selected Files:</h6>
                            <div id="files-preview"></div>
                        </div>
                        
                        <div class="text-center">
                            <button type="submit" id="merge-btn" class="btn btn-danger btn-lg" style="display: none;">
                                <i class="ti ti-file-export me-2"></i>
                                Merge PDFs
                            </button>
                        </div>
                    </form>
                    
                    <div id="result" class="text-center mt-4" style="display: none;">
                        <div class="alert alert-success">
                            <h5>PDFs Merged Successfully!</h5>
                            <p id="result-message"></p>
                            <a href="#" id="download-link" class="btn btn-success" download>
                                <i class="ti ti-download me-2"></i>Download Merged PDF
                            </a>
                        </div>
                    </div>
                    
                    <div id="error" class="alert alert-danger" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('pdf-files').addEventListener('change', function(e) {
    const files = e.target.files;
    if (files.length > 0) {
        displayFiles(files);
        document.getElementById('file-list').style.display = 'block';
        document.getElementById('merge-btn').style.display = files.length >= 2 ? 'inline-block' : 'none';
    }
});

function displayFiles(files) {
    const preview = document.getElementById('files-preview');
    preview.innerHTML = '';
    
    Array.from(files).forEach((file, index) => {
        const fileItem = document.createElement('div');
        fileItem.className = 'card mb-2';
        fileItem.innerHTML = `
            <div class="card-body py-2">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <i class="ti ti-file-text text-danger me-2"></i>
                        <span class="fw-bold">${file.name}</span>
                    </div>
                    <div class="col-md-3">
                        <small class="text-muted">${(file.size / 1024 / 1024).toFixed(2)} MB</small>
                    </div>
                    <div class="col-md-3">
                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeFile(${index})">
                            <i class="ti ti-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
        preview.appendChild(fileItem);
    });
}

function removeFile(index) {
    const fileInput = document.getElementById('pdf-files');
    const files = Array.from(fileInput.files);
    files.splice(index, 1);
    
    // Create new FileList
    const dt = new DataTransfer();
    files.forEach(file => dt.items.add(file));
    fileInput.files = dt.files;
    
    if (files.length > 0) {
        displayFiles(files);
        document.getElementById('merge-btn').style.display = files.length >= 2 ? 'inline-block' : 'none';
    } else {
        document.getElementById('file-list').style.display = 'none';
        document.getElementById('merge-btn').style.display = 'none';
    }
}

document.getElementById('pdf-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const files = document.getElementById('pdf-files').files;
    if (files.length < 2) {
        showError('Please select at least 2 PDF files to merge');
        return;
    }
    
    const formData = new FormData(this);
    
    // Show loading
    const submitBtn = document.getElementById('merge-btn');
    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Merging...';
    submitBtn.disabled = true;
    
    fetch('/api/process-tool/pdf-merger', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showResult(data);
        } else {
            showError(data.error || 'Failed to merge PDFs');
        }
    })
    .catch(error => {
        showError('Network error: ' + error.message);
    })
    .finally(() => {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
    });
});

function showResult(data) {
    document.getElementById('result').style.display = 'block';
    document.getElementById('error').style.display = 'none';
    document.getElementById('result-message').textContent = data.message;
    document.getElementById('download-link').href = data.download_url;
}

function showError(message) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = message;
    document.getElementById('result').style.display = 'none';
}

// Drag and drop functionality
const uploadArea = document.querySelector('.upload-area');

uploadArea.addEventListener('dragover', function(e) {
    e.preventDefault();
    this.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
});

uploadArea.addEventListener('drop', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
    
    const files = e.dataTransfer.files;
    document.getElementById('pdf-files').files = files;
    
    if (files.length > 0) {
        displayFiles(files);
        document.getElementById('file-list').style.display = 'block';
        document.getElementById('merge-btn').style.display = files.length >= 2 ? 'inline-block' : 'none';
    }
});
</script>

<style>
.upload-area.dragover {
    border-color: #007bff !important;
    background-color: #f8f9fa;
}
</style>
{% endblock %}
